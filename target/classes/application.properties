# SERVER
server.port=8081

# DATABASE (H2 EN MEMORIA)
spring.datasource.url=jdbc:h2:mem:historialdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 CONSOLE
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# FEIGN (opcional pero bien tenerlo)
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000

# CIRCUIT BREAKER
resilience4j.circuitbreaker.instances.pacienteService.slidingWindowSize=5
resilience4j.circuitbreaker.instances.pacienteService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.pacienteService.waitDurationInOpenState=10s

resilience4j.circuitbreaker.instances.medicoService.slidingWindowSize=5
resilience4j.circuitbreaker.instances.medicoService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.medicoService.waitDurationInOpenState=10s

resilience4j.circuitbreaker.instances.historialService.slidingWindowSize=5
resilience4j.circuitbreaker.instances.historialService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.historialService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.historialService.minimumNumberOfCalls=3
resilience4j.circuitbreaker.instances.historialService.permittedNumberOfCallsInHalfOpenState=2
